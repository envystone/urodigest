<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IlsanUroDigest — 비뇨의학 오늘의 논문</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0f1a; --surface: #111827; --surface2: #1a2233;
  --border: #1f2d42; --accent: #3b82f6; --accent2: #06b6d4;
  --gold: #f59e0b; --text: #e2e8f0; --muted: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-weight: 300;
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}
.wrapper { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

/* Header */
header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border); padding-bottom: 24px; margin-bottom: 40px; }
.logo { font-family: 'DM Serif Display', serif; font-size: 2rem; background: linear-gradient(135deg, #60a5fa, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.logo-sub { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }
.header-date { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--muted); line-height: 1.8; }

/* Filters */
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.filter-btn {
  padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--muted); font-size: 0.75rem;
  font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s;
}
.filter-btn.active, .filter-btn:hover {
  background: linear-gradient(135deg, #1d4ed8, #0891b2); border-color: transparent; color: #fff;
}

/* Generate button */
.gen-btn {
  display: flex; align-items: center; gap: 10px; padding: 13px 28px;
  background: linear-gradient(135deg, #1d4ed8, #0891b2); border: none; border-radius: 10px;
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500;
  cursor: pointer; box-shadow: 0 4px 20px rgba(59,130,246,0.25); transition: all 0.25s; margin-bottom: 32px;
}
.gen-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.gen-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(59,130,246,0.4); }
.spinner {
  width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
}
.gen-btn.loading .spinner { display: block; }
.gen-btn.loading .btn-label { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Error */
.error-box {
  background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3);
  border-radius: 10px; padding: 14px 18px; color: #fca5a5; font-size: 0.84rem; margin-bottom: 24px; display: none;
}

/* Paper card */
.paper-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; animation: slideIn 0.4s ease; display: none;
}
@keyframes slideIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

.card-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--border); }
.card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.topic-tag { padding: 3px 12px; border-radius: 20px; font-size: 0.67rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.journal-info { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); }
.if-badge { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--gold); }
.paper-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; line-height: 1.4; color: #f1f5f9; margin-bottom: 10px; }
.paper-authors { font-size: 0.73rem; color: var(--muted); line-height: 1.6; }
.paper-authors span { color: #475569; font-style: normal; }

.section { padding: 20px 28px; border-bottom: 1px solid var(--border); }
.section:last-of-type { border-bottom: none; }
.section-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--accent2); margin-bottom: 10px;
}
.section-label::before { content: ''; display: block; width: 3px; height: 10px; background: var(--accent2); border-radius: 2px; }
.section-text { font-size: 0.88rem; line-height: 1.75; color: #cbd5e1; }

.findings-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.findings-list li { display: flex; gap: 10px; font-size: 0.87rem; line-height: 1.6; color: #cbd5e1; }
.findings-list li::before { content: '→'; color: var(--accent); font-weight: 700; flex-shrink: 0; }

.pearl-box {
  background: linear-gradient(135deg, rgba(245,158,11,0.08), rgba(245,158,11,0.03));
  border: 1px solid rgba(245,158,11,0.2); border-radius: 10px;
  padding: 14px 18px; font-size: 0.87rem; line-height: 1.7; color: #fde68a;
  display: flex; gap: 10px; align-items: flex-start;
}

.ev-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
.ev-badge {
  display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px;
  border-radius: 6px; font-size: 0.73rem; font-weight: 600; font-family: 'JetBrains Mono', monospace;
}
.ev-high { background: rgba(5,150,105,0.15); color: #34d399; border: 1px solid rgba(5,150,105,0.3); }
.ev-mod  { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
.ev-low  { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
.study-type-text { font-size: 0.75rem; color: var(--muted); font-style: italic; }
.limitation-text { font-size: 0.8rem; color: #475569; line-height: 1.6; }
.next-text { font-size: 0.83rem; color: #94a3b8; line-height: 1.7; }

.card-footer {
  padding: 14px 28px; background: var(--surface2);
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
}
.pubmed-link { font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; color: var(--accent); text-decoration: none; }
.pubmed-link:hover { text-decoration: underline; }
.save-btn {
  padding: 5px 14px; border: 1px solid var(--border); border-radius: 6px;
  background: transparent; color: var(--muted); font-size: 0.73rem;
  font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s;
}
.save-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Saved */
.saved-section { margin-top: 48px; display: none; }
.saved-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.saved-list { display: flex; flex-direction: column; gap: 8px; }
.saved-item {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px;
}
.saved-item-title { font-size: 0.82rem; color: #94a3b8; line-height: 1.4; }
.saved-item-date { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); white-space: nowrap; }

@media (max-width: 600px) {
  header { flex-direction: column; gap: 12px; }
  .header-date { text-align: left; }
  .paper-title { font-size: 1.1rem; }
  .card-header, .section { padding: 16px 18px; }
}
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div>
      <div class="logo">UroDigest</div>
      <div class="logo-sub">비뇨의학 오늘의 논문</div>
    </div>
    <div class="header-date" id="headerDate"></div>
  </header>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-topic="prostate">전립선</button>
    <button class="filter-btn" data-topic="bladder">방광 / 요로</button>
    <button class="filter-btn" data-topic="incontinence">요실금 / 배뇨장애</button>
    <button class="filter-btn" data-topic="mens">남성 건강</button>
    <button class="filter-btn" data-topic="oncology">비뇨종양</button>
    <button class="filter-btn" data-topic="stone">요로결석</button>
  </div>

  <button class="gen-btn" id="genBtn">
    <div class="spinner"></div>
    <span class="btn-label">🔬 오늘의 논문 불러오기</span>
  </button>

  <div class="error-box" id="errorBox"></div>

  <div class="paper-card" id="paperCard">
    <div class="card-header">
      <div class="card-meta">
        <span class="topic-tag" id="topicTag"></span>
        <span class="journal-info" id="journalInfo"></span>
        <span class="if-badge" id="ifBadge"></span>
      </div>
      <div class="paper-title" id="paperTitle"></div>
      <div class="paper-authors" id="paperAuthors"></div>
    </div>
    <div class="section">
      <div class="section-label">연구 배경</div>
      <div class="section-text" id="secBackground"></div>
    </div>
    <div class="section">
      <div class="section-label">연구 방법</div>
      <div class="section-text" id="secMethods"></div>
    </div>
    <div class="section">
      <div class="section-label">핵심 결과</div>
      <ul class="findings-list" id="secFindings"></ul>
    </div>
    <div class="section">
      <div class="section-label">임상 적용 포인트</div>
      <div class="pearl-box"><span style="font-size:1.1rem;flex-shrink:0">💡</span><span id="secPearl"></span></div>
    </div>
    <div class="section">
      <div class="section-label">근거 수준 & 한계</div>
      <div class="ev-row"><span class="ev-badge" id="evBadge"></span><span class="study-type-text" id="studyType"></span></div>
      <div class="limitation-text" id="secLimit"></div>
    </div>
    <div class="section" id="secNextWrap">
      <div class="section-label">향후 전망</div>
      <div class="next-text" id="secNext"></div>
    </div>
    <div class="card-footer">
      <a class="pubmed-link" id="pubmedLink" href="#" target="_blank"></a>
      <button class="save-btn" id="saveBtn">📌 저장</button>
    </div>
  </div>

  <div class="saved-section" id="savedSection">
    <div class="saved-title">📌 저장된 논문</div>
    <div class="saved-list" id="savedList"></div>
  </div>

</div>

<script>
const TOPICS = {
  prostate:     { label:'전립선',       desc:'전립선암(PCa), BPH, PSA, 로봇수술',     color:'#a78bfa', bg:'rgba(124,58,237,0.18)',  border:'rgba(124,58,237,0.4)' },
  bladder:      { label:'방광/요로',    desc:'방광암, 방광염, 요로감염, 요관',         color:'#67e8f9', bg:'rgba(8,145,178,0.18)',   border:'rgba(8,145,178,0.4)' },
  incontinence: { label:'요실금/배뇨',  desc:'OAB, 야간뇨, 골반저',                   color:'#6ee7b7', bg:'rgba(5,150,105,0.18)',   border:'rgba(5,150,105,0.4)' },
  mens:         { label:'남성건강',     desc:'발기부전, 불임, 저성선증',               color:'#fca5a5', bg:'rgba(220,38,38,0.18)',   border:'rgba(220,38,38,0.4)' },
  oncology:     { label:'비뇨종양',     desc:'신장암, 방광암, 전립선암',               color:'#fdba74', bg:'rgba(234,88,12,0.18)',   border:'rgba(234,88,12,0.4)' },
  stone:        { label:'요로결석',     desc:'신결석, 요관결석, ESWL, URS, PCNL',     color:'#cbd5e1', bg:'rgba(100,116,139,0.18)', border:'rgba(100,116,139,0.4)' },
};

// Date
const now = new Date();
document.getElementById('headerDate').innerHTML =
  now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'}) +
  '<br><span style="color:#3b82f6">비뇨의학과 전용</span>';

let currentTopic = 'prostate';
let savedPapers = [];
try { savedPapers = JSON.parse(localStorage.getItem('uro_saved_v3') || '[]'); } catch{}

// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTopic = btn.dataset.topic;
  });
});

// Generate
document.getElementById('genBtn').addEventListener('click', generate);
document.getElementById('saveBtn').addEventListener('click', savePaper);

async function generate() {
  const btn = document.getElementById('genBtn');
  const errorBox = document.getElementById('errorBox');
  const card = document.getElementById('paperCard');

  btn.disabled = true;
  btn.classList.add('loading');
  errorBox.style.display = 'none';
  card.style.display = 'none';

  const t = TOPICS[currentTopic];
  const prompt = `당신은 비뇨의학과 전문의를 위한 최고 수준의 논문 큐레이터입니다.
현재 날짜는 2026년 4월입니다. 반드시 2025년 또는 2026년에 출판된 최신 "${t.label}" 분야(${t.desc}) 논문 1편을 추천하세요. 2024년 이전 논문은 절대 추천하지 마세요.
European Urology, Journal of Urology, NEJM, Lancet Oncology, JAMA, BJU International 등 IF 높은 저널 우선.

반드시 중괄호로 시작하는 순수 JSON만 응답하세요. 마크다운 코드블록 절대 금지:

{
  "title": "영문 제목",
  "title_ko": "한국어 제목",
  "authors": "제1저자 et al.",
  "journal": "저널명",
  "year": 2025,
  "impact_factor": "예: 12.3",
  "topic_label": "태그명(예: 전립선암)",
  "study_type": "연구 디자인",
  "evidence_level": "high 또는 moderate 또는 low",
  "background": "연구 배경 3-4문장(한국어). 기존 치료 한계, 미충족 수요 중심.",
  "methods": "연구 방법 3-4문장(한국어). n수, 선정기준, 1차평가변수, 추적기간 포함.",
  "key_findings": [
    "1차 결과: HR/OR/p값/95%CI 포함",
    "2차 결과 또는 서브그룹 분석",
    "안전성/삶의질 결과",
    "임상적으로 중요한 추가 발견"
  ],
  "clinical_pearl": "실제 외래/수술에서 어떻게 적용할지 2-3문장(한국어). 구체적 처방·수술 결정 수준.",
  "limitation": "핵심 한계 2가지 1-2문장(한국어)",
  "whats_next": "향후 가이드라인 변화 가능성 1문장(한국어)",
  "pubmed_id": "실제 PMID"
}`;

  try {
    const res = await fetch("https://uro-proxy.envystone.workers.dev", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    const rawText = data.text || '';
    if (!rawText) throw new Error('응답이 비어있습니다.');

    // Strip markdown fences robustly
    const stripped = rawText.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
    const match = stripped.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('JSON을 찾을 수 없습니다. 다시 시도해 주세요.');

    const p = JSON.parse(match[0]);
    renderPaper(p);
  } catch(e) {
    errorBox.textContent = '⚠️ ' + (e.message || '알 수 없는 오류');
    errorBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function renderPaper(p) {
  const t = TOPICS[currentTopic];

  // Tag
  const tag = document.getElementById('topicTag');
  tag.textContent = p.topic_label || t.label;
  tag.style.cssText = `background:${t.bg};color:${t.color};border:1px solid ${t.border}`;

  document.getElementById('journalInfo').textContent = `${p.journal} · ${p.year}`;
  document.getElementById('ifBadge').textContent = `★ IF ${p.impact_factor}`;
  document.getElementById('paperTitle').textContent = p.title_ko || p.title;
  document.getElementById('paperAuthors').innerHTML = `<em>${p.title}</em><br><span>${p.authors}</span>`;
  document.getElementById('secBackground').textContent = p.background;
  document.getElementById('secMethods').textContent = p.methods;

  const fl = document.getElementById('secFindings');
  fl.innerHTML = (p.key_findings||[]).map(f=>`<li>${f}</li>`).join('');

  document.getElementById('secPearl').textContent = p.clinical_pearl;

  const ev = document.getElementById('evBadge');
  const evMap = {
    high:     {cls:'ev-high', txt:'● 근거수준 높음'},
    moderate: {cls:'ev-mod',  txt:'● 근거수준 중등도'},
    low:      {cls:'ev-low',  txt:'● 근거수준 낮음'},
  };
  const evData = evMap[p.evidence_level] || evMap.low;
  ev.className = 'ev-badge ' + evData.cls;
  ev.textContent = evData.txt;

  document.getElementById('studyType').textContent = p.study_type;
  document.getElementById('secLimit').textContent = '⚠️ ' + p.limitation;

  const nextWrap = document.getElementById('secNextWrap');
  if (p.whats_next) {
    document.getElementById('secNext').textContent = '🔭 ' + p.whats_next;
    nextWrap.style.display = 'block';
  } else {
    nextWrap.style.display = 'none';
  }

  const pmid = p.pubmed_id || '';
  const link = document.getElementById('pubmedLink');
  link.href = `https://pubmed.ncbi.nlm.nih.gov/${pmid}/`;
  link.textContent = `🔗 PubMed PMID: ${pmid}`;

  // Store current paper for saving
  document.getElementById('saveBtn')._paper = p;

  document.getElementById('paperCard').style.display = 'block';
}

function savePaper() {
  const p = document.getElementById('saveBtn')._paper;
  if (!p) return;
  const entry = {
    title: p.title_ko || p.title,
    journal: p.journal,
    date: new Date().toLocaleDateString('ko-KR'),
    id: Date.now()
  };
  savedPapers.unshift(entry);
  if (savedPapers.length > 20) savedPapers = savedPapers.slice(0,20);
  try { localStorage.setItem('uro_saved_v3', JSON.stringify(savedPapers)); } catch{}
  renderSaved();
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✅ 저장됨';
  setTimeout(() => { btn.textContent = '📌 저장'; }, 2000);
}

function renderSaved() {
  const sec = document.getElementById('savedSection');
  if (!savedPapers.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  document.getElementById('savedList').innerHTML = savedPapers.map(s => `
    <div class="saved-item">
      <span class="saved-item-title">${s.title}</span>
      <span class="saved-item-date">${s.date} · ${s.journal}</span>
    </div>
  `).join('');
}

renderSaved();
</script>
</body>
</html>
